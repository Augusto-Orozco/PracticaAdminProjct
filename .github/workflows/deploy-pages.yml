name: deploy-pages

on:
  pull_request:
    branches: [develop, staging]
  push:
    branches: [develop, staging]

permissions:
  contents: read

concurrency:
  group: "pages"
  
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: secrets-pages/package-lock.json

      - name: Install dependencies
        working-directory: secrets-pages
        run: npm ci

      # BUILD DEVELOP
      - name: Build develop preview
        if: github.ref == 'refs/heads/develop' || github.base_ref == 'develop'
        working-directory: secrets-pages
        run: npm run build
        env:
          VITE_PUBLIC_ENVIRONMENT: dev
          VITE_PUBLIC_VERSION: ${{ github.sha }}
          VITE_BASE_PATH: /secrets-pages/

          # Variables Actividad 4
          VITE_APP_NAME: SecretsApp
          VITE_PORT: "3000"
          VITE_NODE_ENV: development
          VITE_LOG_LEVEL: debug
          VITE_FEATURE_X_ENABLED: "true"
          VITE_API_KEY: test
          VITE_JWT_SECRET: test
          VITE_DB_PASSWORD: test

      # BUILD STAGING
      - name: Build staging site
        if: github.ref == 'refs/heads/staging' || github.base_ref == 'staging'
        working-directory: secrets-pages
        run: npm run build
        env:
          VITE_PUBLIC_ENVIRONMENT: staging
          VITE_PUBLIC_VERSION: ${{ github.sha }}
          VITE_BASE_PATH: /secrets-pages/

          # Variables Actividad 4
          VITE_APP_NAME: SecretsApp
          VITE_PORT: "3000"
          VITE_NODE_ENV: production
          VITE_LOG_LEVEL: info
          VITE_FEATURE_X_ENABLED: "true"
          VITE_API_KEY: test
          VITE_JWT_SECRET: test
          VITE_DB_PASSWORD: test

      # ARTEFACTO DEVELOP
      - name: Upload preview artifact for develop
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: develop-dist
          path: secrets-pages/dist

  # DEPLOY STAGING
  deploy-staging:
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    needs: quality
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: secrets-pages/package-lock.json

      - name: Install dependencies
        working-directory: secrets-pages
        run: npm ci

      - name: Build staging
        working-directory: secrets-pages
        run: npm run build
        env:
          VITE_PUBLIC_ENVIRONMENT: staging
          VITE_PUBLIC_VERSION: ${{ github.sha }}
          VITE_BASE_PATH: /secrets-pages/

          # Variables Actividad 4
          VITE_APP_NAME: SecretsApp
          VITE_PORT: "3000"
          VITE_NODE_ENV: production
          VITE_LOG_LEVEL: info
          VITE_FEATURE_X_ENABLED: "true"
          VITE_API_KEY: test
          VITE_JWT_SECRET: test
          VITE_DB_PASSWORD: test

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: secrets-pages/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
